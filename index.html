<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        
        :root {
            --bg-dark: #0b0e17;
            --card-bg: #111522;
            --card-border: #1e253c;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --text-yellow: #eab308;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .glass-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.75rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .stat-box {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 1rem;
        }

        .btn-toggle {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-toggle.active {
            border-color: var(--accent-blue);
            background-color: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .season-tab {
            position: relative;
            transition: color 0.3s;
        }

        .season-tab.active {
            color: var(--accent-orange);
        }

        .season-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-orange);
            border-radius: 2px;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Native selects verstecken */
        select.custom-select {
            display: none;
        }
    </style>
</head>

        // ================= CUSTOM SELECT LOGIC =================
        function initCustomSelects() {
            try {
                document.querySelectorAll('select.custom-select').forEach(select => {
                    if (select.nextElementSibling && select.nextElementSibling.classList.contains('custom-select-container')) {
                        select.nextElementSibling.remove();
                    }
                    select.style.display = 'none';
                    
                    const container = document.createElement('div');
                    const isFlex1 = select.classList.contains('flex-1');
                    const isMinW0 = select.classList.contains('min-w-0');
                    const isWFull = select.classList.contains('w-full');
                    
                    container.className = 'relative custom-select-container ' + (isFlex1 ? 'flex-1 ' : '') + (isWFull ? 'w-full ' : '') + (isMinW0 ? 'min-w-0' : '');
                    container.tabIndex = 0;
                    
                    const trigger = document.createElement('div');
                    let triggerClass = select.className.replace('custom-select', '').replace('flex-1', '').replace('min-w-0', '').replace('w-full', '');
                    trigger.className = triggerClass + ' flex justify-between items-center cursor-pointer select-none';
                    trigger.style.backgroundImage = 'none';
                    trigger.style.paddingRight = '1rem';
                    
                    const isRight = select.classList.contains('text-right');
                    const selectedOpt = select.options[select.selectedIndex];
                    trigger.innerHTML = `<span class="truncate ${isRight ? 'w-full text-right' : ''} pr-2">${selectedOpt ? selectedOpt.text : ''}</span><span class="text-slate-500 text-[10px] shrink-0">▼</span>`;
                    
                    const dropdown = document.createElement('div');
                    dropdown.className = 'absolute left-0 top-[calc(100%+8px)] w-full min-w-[12rem] bg-[#161a2b] border border-white/10 rounded-xl shadow-2xl opacity-0 invisible transition-all z-[100] max-h-64 overflow-y-auto custom-scrollbar';
                    if (isRight) { dropdown.classList.replace('left-0', 'right-0'); }

                    container.addEventListener('blur', () => {
                        dropdown.classList.remove('opacity-100', 'visible');
                        dropdown.classList.add('opacity-0', 'invisible');
                    });
                    
                    trigger.addEventListener('click', () => {
                        const isOpen = dropdown.classList.contains('visible');
                        document.querySelectorAll('.custom-select-container > div:last-child').forEach(d => {
                            d.classList.remove('opacity-100', 'visible');
                            d.classList.add('opacity-0', 'invisible');
                        });
                        if (!isOpen) {
                            dropdown.classList.remove('opacity-0', 'invisible');
                            dropdown.classList.add('opacity-100', 'visible');
                            container.focus();
                        }
                    });

                    const createItem = (opt, index) => {
                        const item = document.createElement('div');
                        item.className = 'px-4 py-3 text-xs text-slate-300 hover:bg-white/10 cursor-pointer transition-colors break-words whitespace-normal';
                        if (opt.selected) item.classList.add('text-orange-400', 'bg-white/5', 'font-bold');
                        item.innerHTML = opt.text;
                        
                        item.addEventListener('mousedown', (e) => e.preventDefault());
                        item.addEventListener('click', (e) => {
                            e.stopPropagation();
                            select.selectedIndex = index;
                            trigger.querySelector('span.truncate').innerHTML = opt.text;
                            dropdown.classList.remove('opacity-100', 'visible');
                            dropdown.classList.add('opacity-0', 'invisible');
                            
                            select.dispatchEvent(new Event('change', { bubbles: true }));
                            
                            Array.from(dropdown.querySelectorAll('div.cursor-pointer')).forEach(c => c.classList.remove('text-orange-400', 'bg-white/5', 'font-bold'));
                            item.classList.add('text-orange-400', 'bg-white/5', 'font-bold');
                        });
                        dropdown.appendChild(item);
                    };

                    let optIndex = 0;
                    Array.from(select.children).forEach(child => {
                        if (child.tagName === 'OPTGROUP') {
                            const groupLabel = document.createElement('div');
                            groupLabel.className = 'px-4 py-2 text-[9px] font-black text-slate-500 uppercase tracking-widest bg-[#0b0e17] sticky top-0 z-10 border-y border-white/5 first:border-t-0';
                            groupLabel.innerText = child.label;
                            dropdown.appendChild(groupLabel);
                            
                            const options = child.querySelectorAll('option');
                            Array.from(options).forEach(opt => { createItem(opt, optIndex++); });
                        } else if (child.tagName === 'OPTION') {
                            createItem(child, optIndex++);
                        }
                    });
                    
                    container.appendChild(trigger);
                    container.appendChild(dropdown);
                    select.parentNode.insertBefore(container, select.nextSibling);
                });
            } catch(e) { console.error("Dropdown Build Error", e); }
        }

        function setCloudStatus(status, type) {
            const statusContainer = document.getElementById('cloudStatusContainer');
            const statusEl = document.getElementById('cloudStatus');
            const dotEl = document.getElementById('cloudStatusDot');
            if(!statusEl) return;

            statusEl.innerText = status;
            statusContainer.className = 'hidden md:flex items-center gap-2 px-3 py-1 rounded-full border';
            dotEl.className = 'w-1.5 h-1.5 rounded-full';

            if(type === 'success') {
                statusContainer.classList.add('bg-green-500/10', 'border-green-500/20');
                dotEl.classList.add('bg-green-500', 'animate-pulse');
                statusEl.classList.add('text-green-400');
            } else if(type === 'error') {
                statusContainer.classList.add('bg-red-500/10', 'border-red-500/20');
                dotEl.classList.add('bg-red-500');
                statusEl.classList.add('text-red-400');
            } else {
                statusContainer.classList.add('bg-slate-500/10', 'border-slate-500/20');
                dotEl.classList.add('bg-slate-500');
                statusEl.classList.add('text-slate-400');
            }

        const initAuth = async () => {
            if (!auth) {
                setCloudStatus('Lokaler Modus', 'warn');
                return;
            }
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Auth Error", err);
                setCloudStatus('Auth Error (Rules?)', 'error');
            }
        };

        function setupCloudListeners() {
            if (!db) return;
            setCloudStatus('Verbinde...', 'warn');
            
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), (snapshot) => {
                setCloudStatus('Cloud Sync Active', 'success');
                const serverMatches = snapshot.docs.map(d => d.data());
                
                // Merge
                const merged = [...matches, ...serverMatches];
                const unique = Array.from(new Map(merged.map(item => [item.id, item])).values());
                unique.sort((a, b) => (b.id || 0) - (a.id || 0));
                
                matches = unique;
                localStorage.setItem('ow_stats_v2', JSON.stringify(matches));
                refreshCurrentPage();
            }, (error) => {
                console.error("Firebase Sync Fehler:", error);
                setCloudStatus('DB Regeln fehlen!', 'error');
                showBanner("Cloud blockiert (Firestore Rules prüfen!)", "error");
            });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'ranks', 'allRanks'), (docSnap) => {
                if (docSnap.exists()) {
                    playerRanks = { ...playerRanks, ...docSnap.data() };
                    localStorage.setItem('ow_player_ranks', JSON.stringify(playerRanks));
                }
                if (!document.getElementById('page-players').classList.contains('hidden')) {
                    window.updatePlayerDashboards();
                }
            }, (error) => console.error("Cloud Ranks Error", error));
        }

        function refreshCurrentPage() {
            if (!document.getElementById('page-dashboard').classList.contains('hidden')) window.updateDashboard();
            if (!document.getElementById('page-players').classList.contains('hidden')) window.updatePlayerDashboards();
            if (!document.getElementById('page-entry').classList.contains('hidden')) window.updateRecentMatches();
        }

        window.exportData = function() {
            try {
                const data = { matches, playerRanks };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `ow_backup.json`; a.click();
            } catch(e) { showBanner("Export fehlgeschlagen", "error"); }
        }

        window.importData = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.matches) {
                        matches = data.matches;
                        localStorage.setItem('ow_stats_v2', JSON.stringify(matches));
                        if(currentUser && db) {
                            data.matches.forEach(m => setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), m.id.toString()), m));
                        }
                    }
                    if(data.playerRanks) {
                        playerRanks = data.playerRanks;
                        localStorage.setItem('ow_player_ranks', JSON.stringify(playerRanks));
                        if(currentUser && db) {
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ranks', 'allRanks'), data.playerRanks);
                        }
                    }
                    showBanner("Daten importiert!", "success");
                    location.reload();
                } catch (err) { showBanner("Import fehlgeschlagen!", "error"); }
            };
            reader.readAsText(file);
        }

        window.saveMatch = function() {
            try {
                const players = [];
                const rows = document.getElementById('matchPlayersList').children;
                const names = new Set();
                
                for (let row of rows) {
                    const selects = row.querySelectorAll('select');
                    const n = selects[0].value;
                    if (names.has(n)) { showBanner("Spieler doppelt!", "error"); return; }
                    names.add(n);
                    players.push({ name: n, role: selects[1].value, hero: selects[2].value });
                }
                if (!players.length) return;

                const rStart = document.getElementById('matchRankStart').value;
                const rEnd = document.getElementById('matchRankEnd').value;
                const combinedRank = (rStart !== '-' && rEnd !== '-') ? `${rStart} - ${rEnd.split(' ').pop()}` : (rStart !== '-' ? rStart : '-');

                const match = {
                    id: Date.now(),
                    season: parseInt(document.getElementById('matchSeason').value),
                    type: currentMatchType,
                    result: currentResult,
                    rank: combinedRank,
                    map: document.getElementById('matchMap').value,
                    score: document.getElementById('matchScore').value,
                    leaver: document.getElementById('matchLeaver').checked,
                    players,
                    date: new Date().toLocaleDateString('de-DE'),
                    time: new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })
                };

                matches.unshift(match);
                matches = Array.from(new Map(matches.map(item => [item.id, item])).values());
                matches.sort((a, b) => (b.id || 0) - (a.id || 0));
                localStorage.setItem('ow_stats_v2', JSON.stringify(matches));
                
                if (currentUser && db) {
                    const docRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), match.id.toString());
                    setDoc(docRef, match).then(() => {
                        showBanner("In der Cloud gespeichert!", "success");
                    }).catch(e => {
                        console.error("Speicher-Fehler:", e);
                        showBanner("Cloud-Fehler: " + e.message, "error");
                    });
                } else {
                    showBanner("Lokal gespeichert!", "success");
                }

                document.getElementById('matchScore').value = '';
                document.getElementById('matchLeaver').checked = false;
                
                window.updateRecentMatches();
                if (!document.getElementById('page-dashboard').classList.contains('hidden')) window.updateDashboard();
                if (!document.getElementById('page-players').classList.contains('hidden')) window.updatePlayerDashboards();
            } catch(e) {
                console.error("Save Match Error:", e);
                showBanner("Fehler beim Speichern", "error");
            }
        }

        window.savePlayerRank = function(pName, category, role, value) {
            try {
                if (!playerRanks[pName]) playerRanks[pName] = {};
                playerRanks[pName][`${role}_${category}`] = value;
                localStorage.setItem('ow_player_ranks', JSON.stringify(playerRanks));
                
                if (currentUser && db) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'ranks', 'allRanks');
                    setDoc(docRef, playerRanks, { merge: true }).catch(e => console.error(e));
                }
            } catch(e) { console.error("Save Rank Error", e); }
        }

        window.updateDashboard = function() {
            try {
                const filtered = matches.filter(m => m.season === currentSeason && (currentViewMode === 'Alle' || m.type === currentViewMode));
                const total = filtered.length;
                const wins = filtered.filter(m => m.result === 'Win').length;
                const leavers = filtered.filter(m => m.leaver).length;
                
                document.getElementById('globalWinrate').innerText = total > 0 ? Math.round((wins / total) * 100) + "%" : "0%";
                document.getElementById('globalMatches').innerText = total;
                document.getElementById('globalWins').innerText = wins;
                document.getElementById('globalLosses').innerText = total - wins;
                document.getElementById('globalLeavers').innerText = leavers;
                document.getElementById('globalLeaverPerc').innerText = total > 0 ? Math.round((leavers / total) * 100) + "%" : "0%";

                let curW = 0, curL = 0, maxW = 0, maxL = 0;
                [...filtered].reverse().forEach(m => {
                    if (m.result === 'Win') { curW++; curL = 0; if (curW > maxW) maxW = curW; }
                    else { curL++; curW = 0; if (curL > maxL) maxL = curL; }
                });
                document.getElementById('maxWinStreak').innerText = maxW;
                document.getElementById('maxLossStreak').innerText = maxL;
                
                const combos = {};
                filtered.forEach(m => {
                    if (!m || !Array.isArray(m.players) || m.players.length < 2) return;
                    for (let i = 0; i < m.players.length; i++) {
                        for (let j = i + 1; j < m.players.length; j++) {
                            const p1 = m.players[i], p2 = m.players[j];
                            if(!p1 || !p2) continue;
                            const key = [p1.name, p2.name].sort().join(' · ');
                            if (!combos[key]) combos[key] = { wins: 0, total: 0, p1, p2 };
                            combos[key].total++; if (m.result === 'Win') combos[key].wins++;
                        }
                    }
                });
                const sorted = Object.entries(combos).sort((a,b) => (b[1].wins/b[1].total) - (a[1].wins/a[1].total));
                const renderC = (name, s) => `<div class="glass-card p-4 flex justify-between items-center bg-white/[0.01]"><div><p class="text-xs font-black text-orange-500 uppercase tracking-widest leading-none mb-1">${Math.round((s.wins/s.total)*100)}% Winrate</p><p class="text-[11px] font-bold text-slate-400">${name}</p></div><p class="text-[10px] font-black text-slate-600 bg-black/40 px-2 py-1 rounded-md italic">${s.total} Matches</p></div>`;
                document.getElementById('bestCombos').innerHTML = sorted.slice(0, 3).map(([n,s]) => renderC(n,s)).join('');
                document.getElementById('worstCombos').innerHTML = [...sorted].reverse().slice(0, 3).map(([n,s]) => renderC(n,s)).join('');
            } catch(e) { console.error("Dashboard Render Error", e); }
        }

        window.updatePlayerDashboards = function() {
            try {
                const grid = document.getElementById('playersGrid'); grid.innerHTML = "";
                const seasonMatches = matches.filter(m => m && m.season === currentSeason && Array.isArray(m.players) && (currentViewMode === 'Alle' || m.type === currentViewMode));

                            <div class="border border-white/5 bg-white/[0.02] rounded-xl p-3">
                                <div class="text-[10px] text-slate-400 mb-1 font-bold">Losses</div>
                                <div class="text-xl font-black text-[var(--text-yellow)] leading-none flex items-baseline gap-1.5">
                                    ${losses} ${lossLeavers > 0 ? `<span class="text-[8px] text-red-500 font-bold">(${lossLeavers} Leaver)</span>` : ''}
                                </div>
                            </div>
                        </div>

                        <!-- Winrate je Rolle -->
                        <div class="text-[9px] text-slate-500 uppercase tracking-widest font-black mb-2">Winrate je Rolle</div>
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            ${['tank', 'dps', 'support'].map(r => {
                                const rr = roles[r] || { color: '', icon: '' };
                                return `
                                <div class="border border-white/5 bg-white/[0.02] rounded-xl flex flex-col items-center py-3">
                                    <div class="text-sm mb-1 ${rr.color}">${rr.icon}</div>
                                    <div class="text-sm font-black text-white">${roleStats[r].t > 0 ? Math.round((roleStats[r].w/roleStats[r].t)*100) : '-'}%</div>
                                    <div class="text-[9px] text-slate-500 font-bold">${roleStats[r].t}</div>
                                </div>`
                            }).join('')}
                        </div>

                        <!-- Tops / Flops -->
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase mb-2 flex items-center gap-1"><span class="text-yellow-500">🏆</span> Tops</p>
                                <div class="flex justify-between items-center text-[10px] mb-1.5 border-b border-white/5 pb-1">
                                    <span class="text-slate-500 font-bold">Rolle</span>
                                    <span class="font-bold text-white"><span class="${tRoleData.color}">${tRoleData.icon} ${tRoleData.name}</span> <span class="text-slate-500 text-[8px]">${topRoleCount}x</span></span>
                                </div>
                                <div class="flex justify-between items-center text-[10px]">
                                    <span class="text-slate-500 font-bold">Held</span>
                                    <span class="font-bold text-white">${topHero ? topHero[0] : '-'} <span class="text-green-500 ml-1">${topHero ? Math.round((topHero[1].w/topHero[1].t)*100)+'%' : ''}</span></span>
                                </div>
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase mb-2 flex items-center gap-1">📉 Flops</p>
                                <div class="flex justify-between items-center text-[10px] mb-1.5 border-b border-white/5 pb-1">
                                    <span class="text-slate-500 font-bold">Held</span>
                                    <span class="font-bold text-white">${flopHero ? flopHero[0] : '-'} <span class="text-red-400 ml-1">${flopHero ? Math.round((flopHero[1].w/flopHero[1].t)*100)+'%' : ''}</span></span>
                                </div>
                                <div class="flex justify-between items-center text-[10px]">
                                    <span class="text-slate-500 font-bold">Highscore</span>
                                    <span class="font-bold text-white">-</span>
                                </div>
                            </div>
                        </div>

                        <!-- Mini Table -->
                        <div class="mt-auto pt-2 border-t border-white/5">
                            <table class="w-full text-[9px] text-slate-300 font-bold uppercase tracking-wider">
                                <thead class="border-b border-white/10 text-slate-500">
                                    <tr>
                                        <th class="pb-2 text-left">Datum ↓</th>
                                        <th class="pb-2 text-left">Win</th>
                                        <th class="pb-2 text-left">Modus</th>
                                        <th class="pb-2 text-right">Rolle</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${pMatches.slice(0, 6).map(m => {
                                        const mp = m.players.find(p => p && p.name === pName);
                                        const rIco = (mp && roles[mp.role]) ? roles[mp.role].icon : '';
                                        return `
                                        <tr class="border-b border-white/5 last:border-0">
                                            <td class="py-2.5 opacity-60">${m.date.slice(0, 5)}.${m.date.slice(6,8)}</td>
                                            <td class="py-2.5 ${m.result === 'Win' ? 'text-green-400' : 'text-red-400'}">${m.result}</td>
                                            <td class="py-2.5 opacity-80">${m.type}</td>
                                            <td class="py-2.5 text-right text-xs">${rIco}</td>
                                        </tr>`
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                    grid.appendChild(div);
                });
                initCustomSelects(); 
            } catch(e) { console.error("Render Players Error", e); }
        }

        window.deleteMatch = function(id) {
            if (!confirm("Eintrag unwiderruflich löschen?")) return;
            matches = matches.filter(m => m.id !== id);
            localStorage.setItem('ow_stats_v2', JSON.stringify(matches));
            
            if (currentUser && db) {
                const docRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), id.toString());
                deleteDoc(docRef).catch(e => console.error("Cloud-Fehler beim Löschen"));
            }
            
            window.updateRecentMatches(); 
            window.updateDashboard();
        }

        window.updateRecentMatches = function() {
            try {
                const list = document.getElementById('recentMatchesList');
                list.innerHTML = matches.slice(0, 15).map(m => `
                    <div class="glass-card p-5 space-y-3 relative group animate-in hover:border-white/20 transition-all cursor-default">
                        <button onclick="window.deleteMatch(${m.id})" class="absolute right-4 top-4 opacity-0 group-hover:opacity-100 transition-opacity text-red-500/40 hover:text-red-500 hover:scale-125">🗑️</button>
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-[11px] font-black uppercase italic ${m.result === 'Win' ? 'text-green-500' : 'text-red-500'}">${m.result === 'Win' ? 'Victory' : 'Defeat'}</div>
                                <div class="text-[9px] text-slate-500 font-black tracking-widest mt-1 uppercase">S${m.season} · ${m.type} · ${m.rank}</div>
                            </div>
                            ${m.score ? `<div class="text-[10px] font-black text-orange-500 bg-orange-500/10 px-2 py-1 rounded-lg">${m.score} Pkt</div>` : ''}
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${(m.players || []).map(p => {
                                if(!p) return '';
                                const ro = roles[p.role] || { color: '', icon: '' };
                                return `<div class="bg-white/[0.03] border border-white/5 px-3 py-1.5 rounded-full text-[9px] font-black text-slate-300 uppercase tracking-tighter flex items-center gap-1"><span class="${ro.color} text-sm">${ro.icon}</span> ${p.name} <span class="text-slate-600 ml-1 italic">${p.hero !== 'Keiner' ? p.hero : ''}</span></div>`
                            }).join('')}
                        </div>
                        <div class="text-[9px] text-slate-600 font-bold italic border-t border-white/5 pt-2 flex justify-between">
                            <span>${m.date}, ${m.time}</span>
                            <span>${m.map || 'Keine Map'}</span>
                        </div>
                    </div>`).join('');
            } catch(e) { console.error("Recent Matches Render Error", e); }
        }

        function showBanner(text, type) {
            const banner = document.createElement('div');
            banner.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-[2rem] text-xs font-black shadow-2xl z-[100] ${type === 'error' ? 'bg-red-600' : 'bg-green-600'} text-white border border-white/20 animate-in tracking-widest uppercase italic`;
            banner.innerText = text; document.body.appendChild(banner);
            setTimeout(() => { banner.classList.add('animate-out', 'fade-out'); setTimeout(() => banner.remove(), 500); }, 3500);
        }

        function initApp() {
            window.updateRankOptions(true);
            window.updateMapOptions(true);
            window.addPlayerToMatch();
            
            if (auth) {
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) setupCloudListeners();
                });
                initAuth();
            } else {
                setLocalModeUI();
            }
            window.showPage('entry'); // Startseite beim Laden direkt auf Eintragen 
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

    </script>
</body>
</html>

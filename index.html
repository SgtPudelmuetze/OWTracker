<!DOCTYPE html>
<html lang="de">
<!-- Version: 1.11 - Season-Based Database Storage -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OW2 Team Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --text-yellow: #eab308;
            --divider: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.4);
        }

        .btn-toggle {
            background-color: #1e293b;
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            transition: all 0.2s ease-in-out;
        }

        .btn-toggle.active {
            border-color: var(--accent-blue);
            background-color: rgba(59, 130, 246, 0.15);
        }

        .season-tab {
            position: relative;
            transition: color 0.3s;
            color: #94a3b8;
        }

        .season-tab.active {
            color: var(--accent-orange);
            font-weight: 800;
        }

        .season-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-orange);
            border-radius: 3px;
        }

        .dash-tab {
            padding: 0.75rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 2px solid transparent;
            color: #64748b;
            transition: all 0.3s;
        }
        .dash-tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        select.custom-select {
            display: none;
        }

        .player-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }
        .player-details.open {
            max-height: 1500px;
            opacity: 1;
        }

        .ticket-card {
            border: 1px solid var(--card-border);
        }
        .ticket-open { border-left: 4px solid #3b82f6 !important; }
        .ticket-closed { border-left: 4px solid #10b981 !important; opacity: 0.75; }
        .ticket-bug { border-left: 4px solid #ef4444 !important; }
        
        .nav-link {
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .nav-link.active {
            color: white;
            border-bottom-color: var(--accent-blue);
        }

        .divider-dark {
            border-color: var(--divider);
        }
    </style>
</head>

        const ranksStadium = [{ name: "Rookie", emoji: "🥉" }, { name: "Novice", emoji: "🥈" }, { name: "Contender", emoji: "🛡️" }, { name: "Elite", emoji: "💎" }, { name: "Pro", emoji: "🏆" }, { name: "All-Star", emoji: "⚡" }, { name: "Legend", emoji: "👑" }];

        // Helper: Custom Select
        function initCustomSelects() {
            const selects = document.querySelectorAll('select.custom-select');
            for(let s = 0; s < selects.length; s++) {
                const select = selects[s];
                if (select.nextElementSibling && select.nextElementSibling.classList.contains('custom-select-container')) select.nextElementSibling.remove();
                select.style.display = 'none';
                
                const container = document.createElement('div');
                container.className = 'relative custom-select-container ' + (select.classList.contains('flex-1')?'flex-1 ':'') + (select.classList.contains('w-full')?'w-full ':'');
                container.tabIndex = 0;
                
                const trigger = document.createElement('div');
                trigger.className = select.className.replace('custom-select','') + ' flex justify-between items-center cursor-pointer select-none';
                
                const selectedOpt = select.options[select.selectedIndex];
                trigger.innerHTML = `<span class="truncate">${selectedOpt ? selectedOpt.text : ''}</span><span class="text-slate-500 text-[10px]">▼</span>`;
                
                const dropdown = document.createElement('div');
                dropdown.className = 'absolute left-0 top-[calc(100%+8px)] w-full min-w-[12rem] bg-[#1e293b] border border-slate-700 rounded-2xl shadow-2xl opacity-0 invisible transition-all z-[100] max-h-64 overflow-y-auto custom-scrollbar';
                if (select.classList.contains('text-right')) { dropdown.classList.replace('left-0', 'right-0'); }
                
                container.addEventListener('blur', () => { 
                    dropdown.classList.remove('opacity-100', 'visible'); 
                    dropdown.classList.add('opacity-0', 'invisible'); 
                });
                
                trigger.addEventListener('click', () => { 
                    const isOpen = dropdown.classList.contains('visible');
                    const allDropdowns = document.querySelectorAll('.custom-select-container > div:last-child');
                    for(let d = 0; d < allDropdowns.length; d++) {
                        allDropdowns[d].classList.remove('opacity-100', 'visible');
                        allDropdowns[d].classList.add('opacity-0', 'invisible');
                    }
                    if (!isOpen) {
                        dropdown.classList.remove('opacity-0', 'invisible');
                        dropdown.classList.add('opacity-100', 'visible');
                        container.focus();
                    }
                });

                const children = select.children;
                for(let i = 0; i < children.length; i++) {
                    const child = children[i];
                    if (child.tagName === 'OPTGROUP') {
                        const groupLabel = document.createElement('div');
                        groupLabel.className = 'px-5 py-2 text-[9px] font-black text-slate-500 uppercase bg-[#0f172a] sticky top-0 border-y border-slate-700';
                        groupLabel.innerText = child.label; dropdown.appendChild(groupLabel);
                        const options = child.querySelectorAll('option');
                        for(let j = 0; j < options.length; j++) {
                            addOption(options[j], dropdown, select, trigger);
                        }
                    } else if (child.tagName === 'OPTION') {
                        addOption(child, dropdown, select, trigger);
                    }
                }
                
                container.appendChild(trigger); 
                container.appendChild(dropdown);
                select.parentNode.insertBefore(container, select.nextSibling);
            }
        }
        
        function addOption(opt, dropdown, select, trigger) {
            const item = document.createElement('div');
            item.className = 'px-5 py-3 text-xs text-slate-300 hover:bg-white/10 cursor-pointer transition-colors border-b border-slate-700 last:border-0';
            if (opt.selected) item.classList.add('text-orange-400', 'font-bold');
            item.innerHTML = opt.text;
            item.addEventListener('mousedown', (e) => e.preventDefault());
            item.addEventListener('click', () => {
                select.value = opt.value; 
                trigger.querySelector('span').innerText = opt.text;
                dropdown.classList.remove('opacity-100', 'visible');
                dropdown.classList.add('opacity-0', 'invisible');
                const divItems = dropdown.querySelectorAll('div');
                for(let d = 0; d < divItems.length; d++) {
                    divItems[d].classList.remove('text-orange-400', 'font-bold');
                }
                item.classList.add('text-orange-400', 'font-bold');
                select.dispatchEvent(new Event('change', { bubbles: true }));
            });
            dropdown.appendChild(item);
        }

        function setCloudStatus(status, type) {
            const statusEl = document.getElementById('cloudStatus');
            const dotEl = document.getElementById('cloudStatusDot');
            if(!statusEl) return;
            statusEl.innerText = status;
            dotEl.className = 'w-2 h-2 rounded-full ' + (type==='success'?'bg-green-500 animate-pulse':'bg-slate-500');
        }

        function setupCloudListeners() {
            if (!db) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), (snapshot) => {
                setCloudStatus('Cloud Sync Active', 'success');
                
                // Wir sammeln alte einzelne Matches und neue Season-Matches in einem Array
                let loadedMatches = [];
                snapshot.docs.forEach(d => {
                    const data = d.data();
                    if (data.matches && Array.isArray(data.matches)) {
                        loadedMatches = loadedMatches.concat(data.matches);
                    } else if (data.id) {
                        // Legacy support für einzelne Matches, die noch in der DB liegen
                        loadedMatches.push(data);
                    }
                });
                
                matches = loadedMatches.sort((a, b) => (b.id || 0) - (a.id || 0));
                localStorage.setItem('ow_stats_v2', JSON.stringify(matches));
                refreshCurrentPage();
            });
            
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'ranks', 'allRanks'), (docSnap) => {
                if (docSnap.exists()) playerRanks = docSnap.data();
                if (!document.getElementById('page-players').classList.contains('hidden')) window.updatePlayerDashboards();
            });
            
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tickets'), (snapshot) => {
                tickets = snapshot.docs.map(d => d.data()).sort((a, b) => b.id - a.id);
                if (!document.getElementById('page-tickets').classList.contains('hidden')) window.updateTicketsList();
            });
        }

        function refreshCurrentPage() {
            const pageDash = document.getElementById('page-dashboard');
            const pagePlayers = document.getElementById('page-players');
            const pageEntry = document.getElementById('page-entry');
            const pageTickets = document.getElementById('page-tickets');

            if (pageDash && !pageDash.classList.contains('hidden')) window.updateDashboard();
            if (pagePlayers && !pagePlayers.classList.contains('hidden')) window.updatePlayerDashboards();
            if (pageEntry && !pageEntry.classList.contains('hidden')) window.updateRecentMatches();
            if (pageTickets && !pageTickets.classList.contains('hidden')) window.updateTicketsList();
        }

        window.exportData = function() {
            const data = {
                matches: matches,
                playerRanks: playerRanks,
                tickets: tickets
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            const date = new Date().toLocaleDateString('de-DE').replace(/\./g, '-');
            downloadAnchorNode.setAttribute("download", "ow_tracker_backup_" + date + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showBanner("Daten erfolgreich exportiert!", "success");
        };

        window.importData = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    let importCount = 0;

                    if(data.matches && Array.isArray(data.matches)) {
                        const mergedMatches = [...data.matches, ...matches];
                        const uniqueMatches = Array.from(new Map(mergedMatches.map(item => [item.id, item])).values());
                        matches = uniqueMatches.sort((a, b) => (b.id || 0) - (a.id || 0));
                        localStorage.setItem('ow_stats_v2', JSON.stringify(matches));
                        
                        // Sortieren nach Season für das neue Format
                        const matchesBySeason = {};
                        matches.forEach(m => {
                            if(!matchesBySeason[m.season]) matchesBySeason[m.season] = [];
                            matchesBySeason[m.season].push(m);
                        });
                        
                        Object.keys(matchesBySeason).forEach(season => {
                            if (currentUser && db) {
                                setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), `season_${season}`), { matches: matchesBySeason[season] });
                            }
                        });
                        importCount++;
                    }
                    if(data.playerRanks) {
                        playerRanks = { ...playerRanks, ...data.playerRanks };
                        localStorage.setItem('ow_player_ranks', JSON.stringify(playerRanks));
                        if (currentUser && db) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ranks', 'allRanks'), playerRanks, { merge: true });
                        importCount++;
                    }
                    if(data.tickets && Array.isArray(data.tickets)) {
                        const mergedTickets = [...data.tickets, ...tickets];
                        tickets = Array.from(new Map(mergedTickets.map(item => [item.id, item])).values()).sort((a, b) => (b.id || 0) - (a.id || 0));
                        data.tickets.forEach(t => {
                            if (currentUser && db) setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'tickets'), t.id.toString()), t);
                        });
                        importCount++;
                    }
                    
                    if (importCount > 0) {
                        showBanner("Import erfolgreich! Daten strukturiert geladen.", "success");
                        refreshCurrentPage();
                    } else {
                        showBanner("Keine passenden Daten gefunden.", "error");
                    }
                } catch (err) {
                    console.error(err);
                    showBanner("Import fehlgeschlagen! Ungültige Datei.", "error");
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        };

        window.saveMatch = function() {
            const players = [];
            const rows = document.getElementById('matchPlayersList').children;
            const names = new Set();
            for (let row of rows) {
                const selects = row.querySelectorAll('select');
                if (names.has(selects[0].value)) { showBanner("Spieler doppelt!", "error"); return; }
                names.add(selects[0].value);
                players.push({ name: selects[0].value, role: selects[1].value, hero: selects[2].value });
            }
            if (!players.length) return;
            const rStart = document.getElementById('matchRankStart').value;
            const rEnd = document.getElementById('matchRankEnd').value;
            const matchMapEl = document.getElementById('matchMap');
            const matchScoreEl = document.getElementById('matchScore');
            const matchLeaverEl = document.getElementById('matchLeaver');
            
            const match = { 
                id: Date.now(), 
                season: parseInt(document.getElementById('matchSeason').value), 
                type: currentMatchType, 
                result: currentResult, 
                rank: (rStart !== '-' && rEnd !== '-') ? `${rStart} - ${rEnd.split(' ').pop()}` : (rStart !== '-' ? rStart : '-'), 
                map: matchMapEl ? matchMapEl.value : '', 
                score: matchScoreEl ? matchScoreEl.value : '', 
                leaver: matchLeaverEl ? matchLeaverEl.checked : false, 
                players, 
                date: new Date().toLocaleDateString('de-DE'), 
                time: new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) 
            };
            
            if (currentUser && db) {
                // Lokales Update zur schnellen Anzeige
                const newMatchesForSeason = matches.filter(m => m.season === match.season);
                newMatchesForSeason.push(match);
                newMatchesForSeason.sort((a, b) => b.id - a.id);

                setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), `season_${match.season}`), { matches: newMatchesForSeason }).then(() => {
                    showBanner("Match gespeichert!", "success");
                    if(matchScoreEl) matchScoreEl.value = ''; 
                    if(matchLeaverEl) matchLeaverEl.checked = false;
                }).catch(e => showBanner("Cloud-Fehler", "error"));
            }
        }

        window.updateDashboard = function() {
            const filtered = matches.filter(m => m.season === currentSeason && (currentViewMode === 'Alle' || m.type === currentViewMode));
            const total = filtered.length, wins = filtered.filter(m => m.result === 'Win').length, leavers = filtered.filter(m => m.leaver).length;
            
            setSafeText('globalWinrate', total > 0 ? Math.round((wins / total) * 100) + "%" : "");
            setSafeText('globalMatches', total); 
            setSafeText('globalWins', wins);
            setSafeText('globalLosses', total - wins); 
            setSafeText('globalLeavers', leavers);
            setSafeText('globalLeaverPerc', total > 0 ? Math.round((leavers / total) * 100) + "%" : "");
            setSafeText('lastPlayedDate', filtered.length > 0 ? filtered[0].date : "-");
            
            updateStatsChart(wins, total - wins);
            
            let curW = 0, curL = 0, maxW = 0, maxL = 0;
            [...filtered].reverse().forEach(m => { if (m.result === 'Win') { curW++; curL = 0; if (curW > maxW) maxW = curW; } else { curL++; curW = 0; if (curL > maxL) maxL = curL; } });
            
            setSafeText('maxWinStreak', maxW); 
            setSafeText('maxLossStreak', maxL);
            
            const combos = {};
            filtered.forEach(m => { if (!m.players) return; for (let i = 0; i < m.players.length; i++) for (let j = i + 1; j < m.players.length; j++) { const key = [m.players[i].name, m.players[j].name].sort().join(' · '); if (!combos[key]) combos[key] = { wins: 0, total: 0 }; combos[key].total++; if (m.result === 'Win') combos[key].wins++; } });
            const sorted = Object.entries(combos).sort((a,b) => (b[1].wins/b[1].total) - (a[1].wins/a[1].total));
            const renderC = (name, s) => `<div class="glass-card p-4 flex justify-between items-center border-slate-700"><div><p class="text-[11px] font-black text-orange-500 uppercase leading-none mb-1.5">${Math.round((s.wins/s.total)*100)}% WR</p><p class="text-xs font-bold text-slate-300">${name}</p></div><p class="text-[10px] text-slate-500 italic">${s.total} Gms</p></div>`;
            
            const bestEl = document.getElementById('bestCombos');
            const worstEl = document.getElementById('worstCombos');
            if(bestEl) bestEl.innerHTML = sorted.slice(0, 3).map(([n,s]) => renderC(n,s)).join('');
            if(worstEl) worstEl.innerHTML = [...sorted].reverse().slice(0, 3).map(([n,s]) => renderC(n,s)).join('');
        }

        function updateStatsChart(wins, losses) {
            const ctx = document.getElementById('winLossChart'); if(!ctx) return;
            if(statsChart) statsChart.destroy();
            const hasData = wins > 0 || losses > 0;
            statsChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Wins', 'Losses'], datasets: [{ data: hasData ? [wins, losses] : [1], backgroundColor: hasData ? ['#22c55e', '#ef4444'] : ['#334155'], borderColor: 'rgba(255,255,255,0.05)', borderWidth: 4, cutout: '72%', borderRadius: 8 }] }, options: { plugins: { legend: { display: false } }, animation: { duration: 1200 } } });
        }

        window.updatePlayerDashboards = function() {
            const grid = document.getElementById('playersGrid'); if(!grid) return; grid.innerHTML = "";
            const seasonMatches = matches.filter(m => m.season === currentSeason && (currentViewMode === 'Alle' || m.type === currentViewMode));
            knownPlayers.forEach(pName => {
                const pMatches = seasonMatches.filter(m => m.players.some(p => p.name === pName));
                const total = pMatches.length, wins = pMatches.filter(m => m.result === 'Win').length;
                const ranks = playerRanks[pName] || {};
                const createSelects = (cat) => ['tank', 'dps', 'support'].map(r => {
                    const val = ranks[`${r}_${cat}`] || '-'; const list = cat === 'ranked' ? ranksRanked : ranksStadium; const pref = cat === 'ranked' ? 'icon' : 'emoji';
                    return `<div class="flex items-center justify-between mb-2 bg-[#0f172a] border border-slate-700 rounded-xl px-3 py-1.5"><span class="text-[10px] font-black flex items-center gap-1.5 text-slate-400 shrink-0 w-16"><span class="${roles[r].color}">${roles[r].icon}</span> ${roles[r].name}</span><select onchange="window.savePlayerRank('${pName}', '${cat}', '${r}', this.value)" class="custom-select flex-1 bg-transparent text-[11px] font-black text-orange-500 text-right"><option value="-">-</option>${list.map(rr => { let os = ''; for(let i=5; i>=1; i--) { const v = `${rr[pref]} ${rr.name} ${i}`; os += `<option value="${v}" ${val === v ? 'selected' : ''}>${v}</option>`; } return os; }).join('')}</select></div>`;
                }).join('');
                let roleStats = { tank: {w:0, t:0}, dps: {w:0, t:0}, support: {w:0, t:0} }, heroStats = {};
                pMatches.forEach(m => { let p = m.players.find(x => x.name === pName); if(p && roleStats[p.role]) { roleStats[p.role].t++; if(m.result === 'Win') roleStats[p.role].w++; if(p.hero && p.hero !== "Held wählen" && p.hero !== "") { if(!heroStats[p.hero]) heroStats[p.hero] = {w:0, t:0}; heroStats[p.hero].t++; if(m.result === 'Win') heroStats[p.hero].w++; } } });
                const validH = Object.entries(heroStats).sort((a,b) => (b[1].w/b[1].t) - (a[1].w/a[1].t));
                const topHero = validH[0], flopHero = [...validH].reverse()[0], isOpen = openPlayerDetails.has(pName);
                const winRateString = total > 0 ? Math.round((wins/total)*100) + '%' : '';
                const div = document.createElement('div'); div.className = "glass-card p-6 border-slate-700";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-black text-white italic">${pName}</h2>
                        <div class="text-right">
                            <div class="text-xl font-black text-[var(--text-yellow)]">${winRateString}</div>
                            <div class="text-[9px] text-slate-500 uppercase font-black">${total > 0 ? total + ' Gms' : ''}</div>
                        </div>
                    </div>
                    <div class="border border-slate-700 rounded-2xl p-3 grid grid-cols-2 gap-3 mb-6 bg-black/20">
                        <div><div class="text-[9px] text-slate-600 mb-2 font-black px-1">Ranked</div>${createSelects('ranked')}</div>
                        <div><div class="text-[9px] text-slate-600 mb-2 font-black px-1">Stadium</div>${createSelects('stadium')}</div>
                    </div>
                    <button onclick="window.toggleDetails('${pName}')" id="btn-${pName}" class="w-full py-3 bg-white/5 hover:bg-white/10 text-slate-400 text-[10px] font-black uppercase rounded-xl border border-slate-700">${isOpen ? 'Details Ausblenden' : 'Details Anzeigen'}</button>
                    <div id="details-${pName}" class="player-details space-y-6 pt-6 ${isOpen ? 'open' : ''}">
                        <div class="grid grid-cols-3 gap-3">
                            ${['tank', 'dps', 'support'].map(r => { const wr = roleStats[r].t > 0 ? Math.round((roleStats[r].w/roleStats[r].t)*100) + '%' : ''; return `<div class="border border-slate-700 bg-white/[0.03] rounded-2xl flex flex-col items-center py-4"><div class="text-lg mb-1.5 ${roles[r].color}">${roles[r].icon}</div><div class="text-[13px] font-black text-white">${wr}</div><div class="text-[9px] text-slate-600">${roleStats[r].t > 0 ? roleStats[r].t + 'x' : ''}</div></div>` }).join('')}
                        </div>
                        <div class="grid grid-cols-2 gap-6 text-[10px]">
                            <div><p class="text-slate-500 uppercase font-black mb-2">🏆 Top Held</p><p class="text-white text-xs font-black">${topHero ? topHero[0] : '-'}</p></div>
                            <div><p class="text-slate-500 uppercase font-black mb-2">📉 Flop Held</p><p class="text-white text-xs font-black">${flopHero ? flopHero[0] : '-'}</p></div>
                        </div>
                        <div class="pt-4 border-t border-slate-700">
                            <table class="w-full text-[10px] text-slate-300 font-bold uppercase">
                                <tbody>${pMatches.slice(0, 5).map(m => `<tr class="border-b border-white/5 last:border-0"><td class="py-2 opacity-60">${m.date.slice(0, 5)}</td><td class="py-2 ${m.result === 'Win' ? 'text-green-400' : 'text-red-500'}">${m.result}</td><td class="py-2 text-right">${roles[m.players.find(p => p.name === pName).role].icon}</td></tr>`).join('')}</tbody>
                            </table>
                        </div>
                    </div>`;
                grid.appendChild(div);
            });
            initCustomSelects(); 
        }

        window.updateRecentMatches = function() {
            const list = document.getElementById('recentMatchesList'); if(!list) return;
            list.innerHTML = matches.slice(0, 15).map(m => `
                <div class="glass-card p-6 space-y-4 border-slate-700 relative group animate-in">
                    <button onclick="window.deleteMatch(${m.id})" class="absolute right-5 top-5 opacity-0 group-hover:opacity-100 text-red-500 transition-opacity">🗑️</button>
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-[12px] font-black uppercase italic ${m.result === 'Win' ? 'text-green-400' : 'text-red-500'}">${m.result === 'Win' ? 'Victory' : 'Defeat'}</div>
                            <div class="text-[10px] text-slate-500 font-black mt-1 uppercase">S${m.season} · ${m.type} · ${m.rank}</div>
                        </div>
                        ${m.score ? `<div class="text-[11px] font-black text-orange-500 bg-orange-500/10 px-3 py-1.5 rounded-xl border border-orange-500/20">${m.score}</div>` : ''}
                    </div>
                    <div class="flex flex-wrap gap-2">${(m.players || []).map(p => `<div class="bg-white/[0.04] border border-slate-700 px-3 py-1.5 rounded-xl text-[10px] font-black text-slate-200 uppercase flex items-center gap-1.5"><span>${roles[p.role].icon}</span> ${p.name} <span class="text-slate-600 italic font-medium ml-1">${p.hero && p.hero !== 'Held wählen' ? p.hero : ''}</span></div>`).join('')}</div>
                    <div class="text-[10px] text-slate-600 font-black border-t border-slate-700 pt-3 flex justify-between uppercase"><span>${m.date}</span><span>${m.map || '-'}</span></div>
                </div>`).join('');
        }

        window.deleteMatch = function(id) { 
            if (!confirm("Match löschen?") || !currentUser) return; 
            
            const matchToDelete = matches.find(m => m.id === id);
            if (!matchToDelete) return;
            const targetSeason = matchToDelete.season;
            
            // Remove locally
            matches = matches.filter(m => m.id !== id);
            const seasonMatches = matches.filter(m => m.season === targetSeason);
            
            // Update the season document
            setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), `season_${targetSeason}`), { matches: seasonMatches })
            .then(() => {
                showBanner("Gelöscht!", "success");
                // Optional: delete old single document if it exists, to clean up
                deleteDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), id.toString())).catch(()=>{});
            }); 
        }
        
        function showBanner(text, type) { const banner = document.createElement('div'); banner.className = `fixed bottom-12 left-1/2 -translate-x-1/2 px-10 py-5 rounded-[2.5rem] text-[11px] font-black z-[100] ${type === 'error' ? 'bg-red-600' : 'bg-green-600'} text-white border border-white/20 animate-in tracking-widest uppercase italic shadow-2xl`; banner.innerText = text; document.body.appendChild(banner); setTimeout(() => banner.remove(), 3500); }
        onAuthStateChanged(auth, (u) => { currentUser = u; if (u) setupCloudListeners(); });
        signInAnonymously(auth).catch(e => setCloudStatus('Auth Error', 'error'));
        window.showPage('dashboard'); window.updateRankOptions(true); window.updateMapOptions(true); window.addPlayerToMatch();
    </script>
</body>
</html>
